<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 900" role="img" aria-label="The School Shop logo" >
  <defs>
    <style>
      @font-face {
        font-family: 'Titan One';
        src: url(data:font/woff2;base64,) format('woff2');
        font-weight: 400;
        font-style: normal;
      }
    </style>
    <g id="kid">
      <circle cx="8" cy="-78" r="42" fill="#FF2E64"/>
      <path d="M 2 8 L -78 -68" stroke="#FF2E64" stroke-width="30" stroke-linecap="round" fill="none"/>
      <path d="M 6 4 L 88 -50" stroke="#FF2E64" stroke-width="30" stroke-linecap="round" fill="none"/>
      <path d="M 4 -12 C -30 30 -52 90 -60 152 C -20 172 30 168 58 138 C 44 80 26 24 4 -12 Z" fill="#FF2E64"/>
    </g>
  </defs>

  <!-- house -->
  <rect x="375" y="248" width="250" height="270" rx="16" fill="#8C1FA8"/>
  <path d="M 330 235 L 500 115 L 670 235" stroke="#8C1FA8" stroke-width="46" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <g fill="#111116">
    <rect x="449" y="294" width="44" height="44" rx="10"/>
    <rect x="507" y="294" width="44" height="44" rx="10"/>
    <rect x="449" y="352" width="44" height="44" rx="10"/>
    <rect x="507" y="352" width="44" height="44" rx="10"/>
  </g>

  <!-- celebrating kids -->
  <use href="#kid" transform="translate(280 330)"/>
  <use href="#kid" transform="translate(720 330) scale(-1 1)"/>

  <!-- cloud -->
  <g fill="#8C1FA8">
    <circle cx="250" cy="590" r="145"/>
    <circle cx="375" cy="525" r="140"/>
    <circle cx="625" cy="525" r="140"/>
    <circle cx="750" cy="590" r="145"/>
    <circle cx="500" cy="640" r="200"/>
    <circle cx="360" cy="730" r="115"/>
    <circle cx="640" cy="730" r="115"/>
    <circle cx="500" cy="760" r="120"/>
  </g>

  <!-- pink parentheses swooshes -->
  <g stroke="#FF2E64" stroke-width="20" stroke-linecap="round" fill="none">
    <path d="M 244 556 Q 226 586 222 622"/>
    <path d="M 222 652 Q 228 694 254 726"/>
    <path d="M 748 692 Q 768 726 771 764"/>
    <path d="M 769 794 Q 763 830 738 856"/>
  </g>

  <!-- wordmark -->
  <text font-family="Titan One, Arial Black, sans-serif" text-anchor="middle" letter-spacing="4" x="500" y="540" font-size="95" fill="#FFDD15" rotate="-5 2 5" dy="0 -8 14">THE</text>
  <text font-family="Titan One, Arial Black, sans-serif" text-anchor="middle" letter-spacing="4" x="500" y="660" font-size="126" fill="#35DDF2" rotate="-4 3 -3 4 -4 3" dy="0 -10 16 -14 12 -8">SCHOOL</text>
  <text font-family="Titan One, Arial Black, sans-serif" text-anchor="middle" letter-spacing="4" x="500" y="782" font-size="126" fill="#3FDE8A" rotate="-4 4 -3 4" dy="0 -12 18 -12">SHOP</text>
</svg>